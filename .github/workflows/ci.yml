name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install workspace
        run: pnpm install --recursive --no-frozen-lockfile

      - name: Run checks
        run: pnpm -r check

      - name: Build artifacts
        run: pnpm -r build
